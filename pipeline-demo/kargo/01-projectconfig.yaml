  namespace: pipeline-demo
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
spec:
  promotionPolicies:
  - stageSelector:
      name: staging
    autoPromotionEnabled: true
  - stageSelector:
      name: prod
    autoPromotionEnabled: true
