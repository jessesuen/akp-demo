name: Reset Demo

on:
  workflow_dispatch:

jobs:
  reset:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout reset branch
        uses: actions/checkout@v4
        with:
          ref: reset
          fetch-depth: 0

      - name: Reset main to reset branch
        run: |
          git push origin refs/heads/reset:refs/heads/main --force

      - name: Delete resources
        env:
          ARGOCD_AUTH_TOKEN: ${{ secrets.ARGOCD_AUTH_TOKEN }}
          ARGOCD_SERVER: ${{ vars.ARGOCD_SERVER }}
          ARGOCD_OPTS: --grpc-web
        run: |
          curl -sSL -o /usr/local/bin/argocd https://${ARGOCD_SERVER}/download/argocd-linux-amd64
          chmod +x /usr/local/bin/argocd
          argocd app delete-resource guestbook-prod-oom --kind Deployment --resource-name oom-demo || true
          argocd app delete-resource akp-demo-bootstrap-kargo --kind Stage --resource-name prod-oom || true
          for i in $(seq 1 5); do
            argocd app sync akp-demo-bootstrap-kargo && break
            echo "Sync attempt $i failed, retrying in 8s..."
            sleep 8
          done
          argocd proj create -f ./pipeline-demo/argocd/00-project.yaml --upsert
          argocd app create -f ./pipeline-demo/argocd/01-argocd-apps.yaml --upsert

      - name: Delete AI conversations
        env:
          ARGOCD_SERVER: ${{ vars.ARGOCD_SERVER }}
          KUBEVISION_USERNAME: ${{ secrets.KUBEVISION_USERNAME }}
          KUBEVISION_PASSWORD: ${{ secrets.KUBEVISION_PASSWORD }}
          AKUITY_ORG_ID: ${{ vars.AKUITY_ORG_ID }}
        run: |
          BASE_URL="https://${ARGOCD_SERVER}/ext-api/v1/argocd/extensions/kubevision/orgs/${AKUITY_ORG_ID}/ai/conversations"
          INSTANCE_ID="${ARGOCD_SERVER#https://}"
          INSTANCE_ID="${INSTANCE_ID%%.*}"

          for id in $(curl -sSL "${BASE_URL}?instanceId=${INSTANCE_ID}&limit=50" \
              -u "${KUBEVISION_USERNAME}:${KUBEVISION_PASSWORD}" \
              -H 'x-platform: argocd' | jq -r '.conversations[].id'); do
            curl -sSL -X DELETE "${BASE_URL}/${id}?instanceId=${INSTANCE_ID}" \
              -u "${KUBEVISION_USERNAME}:${KUBEVISION_PASSWORD}" \
              -H 'x-platform: argocd'
            echo "Deleted conversation: ${id}"
          done

      - name: Reset Kargo
        env:
          KARGO_API_TOKEN: ${{ secrets.KARGO_API_TOKEN }}
          KARGO_API_ADDRESS: ${{ vars.KARGO_API_ADDRESS }}
        run: |
          curl -L -o /usr/local/bin/kargo https://github.com/akuity/kargo/releases/download/v1.9.5/kargo-linux-amd64
          chmod +x /usr/local/bin/kargo
          kargo delete stage --project pipeline-demo dev staging prod-eu prod-us || true
          kargo apply -R -f ./pipeline-demo/kargo
          sleep 4
          kargo promote --project=pipeline-demo --freight-alias=solid-molly --stage=dev
